# ==================================================================
# Scarlet feature flags — read by net.sybyline.scarlet.Features.
#
# This file is bundled by the DEFAULT ("full") Maven build.  The
# "lite" Maven profile strips it out via the shade-plugin filter, so
# the lite JAR falls back to the compile-time defaults (all off).
#
# Each flag here must match a loadFlag() key in Features.java.
# ==================================================================

# Enable the RVC (Retrieval-based Voice Conversion) subsystem.
# Controls whether the RVC UI section, the Python bridge install
# flow, and the torch dependency check are active at runtime.
rvc.enabled=true
