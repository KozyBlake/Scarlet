name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'mobile/android/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Gradle wrapper
        working-directory: mobile/android/ScarletCompanion
        run: gradle wrapper --gradle-version=8.7

      - name: Build debug APK
        working-directory: mobile/android/ScarletCompanion
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ScarletCompanion-debug
          path: mobile/android/ScarletCompanion/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
